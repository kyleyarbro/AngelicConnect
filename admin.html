<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Angelic Connect | Staff Console</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="brand.js"></script>
    <script src="supabase.js"></script>
    <script defer src="admin.js"></script>
  </head>
  <body class="app-body admin-body">
    <header class="topbar">
      <div class="brand-pair">
        <span class="brand-mark small" data-brand="logoText">AB</span>
        <div>
          <p class="eyebrow" data-brand="companyName"></p>
          <h1>Staff Console</h1>
        </div>
      </div>
      <button id="logoutBtn" class="btn btn-outline">Logout</button>
    </header>

    <main class="main-content admin-layout">
      <aside class="admin-sidebar card" id="adminSidebar"></aside>
      <section class="admin-panel" id="adminMain"></section>
    </main>
  </body>
</html>
